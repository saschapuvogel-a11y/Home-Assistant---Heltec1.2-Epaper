esphome:
  name: heltec-wireless-paper
  friendly_name: Heltec E-Paper

  on_boot:
    priority: -100
    then:
      - delay: 5s
      - component.update: epaper

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: arduino

external_components:
  - source:
      type: local
      path: components
    components: [heltec_epaper]

logger:
  level: DEBUG

api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

safe_mode:
  disabled: false

light:
  - platform: status_led
    name: "Status LED"
    pin: GPIO18

# GPIO3/GPIO2 sind die E-Paper-SPI-Pins.
# GPIO9/GPIO10 gehören zum SX1262-LoRa-Modul.
spi:
  clk_pin: GPIO3
  mosi_pin: GPIO2

font:
  - file: "gfonts://Roboto"
    id: font_main
    size: 22

globals:
  - id: refresh_counter
    type: int
    restore_value: no
    initial_value: "0"

display:
  - platform: heltec_epaper
    id: epaper

    cs_pin: GPIO4
    dc_pin: GPIO5
    reset_pin: GPIO6
    busy_pin: GPIO7

    full_update_every: 10
    update_interval: 30s

    lambda: |-
      id(refresh_counter)++;

      const int width = it.get_width();
      const int height = it.get_height();
      const int visible_counter = id(refresh_counter) % 1000;

      it.printf(
        width / 2,
        5,
        id(font_main),
        TextAlign::TOP_CENTER,
        "Refresh-Test"
      );

      it.printf(
        width / 2,
        height / 2,
        id(font_main),
        TextAlign::CENTER,
        "%03d",
        visible_counter
      );

      it.printf(
        width / 2,
        height - 5,
        id(font_main),
        TextAlign::BOTTOM_CENTER,
        "%lus",
        static_cast<unsigned long>(millis() / 1000)
      );
