esphome:
  name: heltec-wireless-paper-battery
  friendly_name: Heltec E-Paper Battery

  # Boot -> wait for network/API -> refresh -> panel sleep/VEXT off -> ESP deep sleep.
  on_boot:
    priority: -100
    then:
      - delay: 10s
      - component.update: epaper
      - delay: 500ms
      - lambda: |-
          id(epaper).sleep();
      - if:
          condition:
            lambda: return id(epaper).is_sleeping();
          then:
            - delay: 250ms
            - deep_sleep.enter: deep_sleep_control
          else:
            - logger.log:
                level: ERROR
                format: "Display sleep failed; ESP deep sleep was cancelled"

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: arduino

external_components:
  - source:
      type: local
      path: components
    components: [heltec_epaper]

logger:
api:
ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

spi:
  clk_pin: GPIO3
  mosi_pin: GPIO2

font:
  - file: "gfonts://Roboto"
    id: font_main
    size: 22

deep_sleep:
  id: deep_sleep_control
  sleep_duration: 10min

display:
  - platform: heltec_epaper
    id: epaper
    cs_pin: GPIO4
    dc_pin: GPIO5
    reset_pin: GPIO6
    busy_pin: GPIO7
    power_pin:
      number: GPIO45
      ignore_strapping_warning: true
    power_on_delay: 100ms
    busy_timeout: 20s
    rotation: 90
    update_interval: never
    # Every boot starts from a power-off state, so a full refresh is safest.
    full_update_every: 1
    lambda: |-
      it.fill(COLOR_OFF);
      it.rectangle(0, 0, it.get_width() - 1, it.get_height() - 1, COLOR_ON);
      it.print(12, 10, id(font_main), COLOR_ON, "Heltec V1.2");
      it.print(12, 44, id(font_main), COLOR_ON, "Battery mode");
      it.print(12, 78, id(font_main), COLOR_ON, "Sleep: 10 min");
